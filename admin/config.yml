backend:
  name: github
  repo: fdeleo115/ghpls-website
  branch: main
  # GitHub login is handled by this site's own Cloudflare Pages Functions
  # (functions/api/auth.js + functions/api/callback.js). No third-party server.
  base_url: https://ghpls.fdeleo115.workers.dev
  auth_endpoint: api/auth

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "achievements"
    label: "Achievements"
    label_singular: "Achievement"
    description: "Add or edit competition results here."
    folder: "src/achievements"
    create: true
    identifier_field: "competition"
    slug: "{{competition}}-{{year}}"
    extension: "md"
    fields:
      - { label: "Competition Name", name: "competition", widget: "string", hint: "e.g. HSFK Cup, Centre Block Cup" }
      - { label: "Year", name: "year", widget: "number", value_type: "int" }
      - label: "Results"
        name: "results"
        widget: "list"
        hint: "Add each award won at this competition"
        fields:
          - { label: "Award", name: "award", widget: "string", hint: "e.g. Finalists, Semi-Finalists, Best Oral Advocate" }
          - { label: "Recipients", name: "recipients", widget: "string", hint: "e.g. Kate Hilton & Ava Gonsalves" }
      - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Upload a photo from this competition" }
      - label: "Photo Fit"
        name: "photoSize"
        widget: "select"
        required: false
        default: "cover"
        hint: "Fill area (crop) or show the entire photo (may leave gaps)"
        options:
          - { label: "Fill area (crop to fit)", value: "cover" }
          - { label: "Show entire photo (may have gaps)", value: "contain" }
      - { label: "Photo Focus (drag to position)", name: "photoPosition", widget: "focal-point", required: false, default: "center", image_field: "photo", hint: "Drag the dot to choose what part of the photo stays in view" }

  - name: "events"
    label: "Upcoming Events"
    label_singular: "Event"
    description: "Add upcoming events here. Move them to Past Events once they're done."
    folder: "src/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Time", name: "time", widget: "string", hint: "e.g. 5:00 PM - 7:00 PM", required: false }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Upload a photo for this event" }
      - label: "Photo Fit"
        name: "photoSize"
        widget: "select"
        required: false
        default: "cover"
        hint: "Fill area (crop) or show the entire photo (may leave gaps)"
        options:
          - { label: "Fill area (crop to fit)", value: "cover" }
          - { label: "Show entire photo (may have gaps)", value: "contain" }
      - { label: "Photo Focus (drag to position)", name: "photoPosition", widget: "focal-point", required: false, default: "center", image_field: "photo", hint: "Drag the dot to choose what part of the photo stays in view" }

  - name: "ghcup-winners"
    label: "GH Cup Previous Winners"
    label_singular: "GH Cup Year"
    description: "Add winners for each year of The GH Cup."
    folder: "src/ghcup-winners"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Year", name: "year", widget: "number", value_type: "int" }
      - { label: "Theme / Title", name: "theme", widget: "string", hint: "e.g. The GH Cup 2026" }
      - { label: "Case Title", name: "caseTitle", widget: "string", required: false, hint: "The case used for this year's competition" }
      - label: "Awards"
        name: "awards"
        widget: "list"
        hint: "Add each award (Winner, Runner-Up, Best Oral Advocate, Best Written, etc.)"
        fields:
          - { label: "Award Title", name: "title", widget: "string", hint: "e.g. Winner, Runner-Up, Best Oral Advocate" }
          - { label: "Recipients", name: "recipients", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Upload a photo from this year's GH Cup" }
      - label: "Photo Fit"
        name: "photoSize"
        widget: "select"
        required: false
        default: "cover"
        hint: "Fill area (crop) or show the entire photo (may leave gaps)"
        options:
          - { label: "Fill area (crop to fit)", value: "cover" }
          - { label: "Show entire photo (may have gaps)", value: "contain" }
      - { label: "Photo Focus (drag to position)", name: "photoPosition", widget: "focal-point", required: false, default: "center", image_field: "photo", hint: "Drag the dot to choose what part of the photo stays in view" }

  - name: "past-events"
    label: "Past Events"
    label_singular: "Past Event"
    description: "Record of past events. You can add photos from the event."
    folder: "src/past-events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Upload a photo from this event" }
      - label: "Photo Fit"
        name: "photoSize"
        widget: "select"
        required: false
        default: "cover"
        hint: "Fill area (crop) or show the entire photo (may leave gaps)"
        options:
          - { label: "Fill area (crop to fit)", value: "cover" }
          - { label: "Show entire photo (may have gaps)", value: "contain" }
      - { label: "Photo Focus (drag to position)", name: "photoPosition", widget: "focal-point", required: false, default: "center", image_field: "photo", hint: "Drag the dot to choose what part of the photo stays in view" }
      - label: "Extra Photos"
        name: "extraPhotos"
        widget: "list"
        required: false
        hint: "Add more photos from this event"
        fields:
          - { label: "Photo", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }

  - name: "photos"
    label: "Photo Gallery"
    label_singular: "Photo"
    description: "Upload photos to the gallery. They show up on the Photos page."
    folder: "src/photos"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Title / Caption", name: "title", widget: "string", hint: "A short caption for the photo" }
      - { label: "Photo", name: "image", widget: "image" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Category", name: "category", widget: "select", options: ["Competition", "Event", "Social", "Other"], required: false }
      - { label: "Photo Focus (drag to position)", name: "photoPosition", widget: "focal-point", required: false, default: "center", image_field: "image", hint: "Drag the dot to choose what part of the photo stays in view in the gallery grid" }
      - label: "Photo Size in Gallery"
        name: "size"
        widget: "select"
        required: false
        hint: "How big this photo appears in the gallery"
        options:
          - { label: "Normal", value: "normal" }
          - { label: "Wide (spans 2 columns)", value: "wide" }
          - { label: "Tall (spans 2 rows)", value: "tall" }
          - { label: "Large (spans 2x2)", value: "large" }

  - name: "team"
    label: "Executive Team"
    label_singular: "Team Member"
    description: "Add or update exec team members. They appear on the About page."
    folder: "src/team"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role / Title", name: "role", widget: "string", hint: "e.g. President, Vice President" }
      - { label: "Display Order", name: "order", widget: "number", value_type: "int", hint: "1 = shown first, 2 = second, etc." }
      - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Upload a headshot" }
      - { label: "Photo Focus (drag to position)", name: "photoPosition", widget: "focal-point", required: false, default: "center", image_field: "photo", hint: "Drag the dot onto the face so it isn't cut off in the round headshot" }

  - name: "pages"
    label: "Page Content"
    description: "Edit the text content on each page."
    files:
      - label: "Site Settings"
        name: "site-settings"
        file: "src/_data/site.json"
        fields:
          - { label: "Site Title", name: "title", widget: "string" }
          - { label: "Short Title (nav bar)", name: "shortTitle", widget: "string" }
          - { label: "Site Description", name: "description", widget: "text", hint: "Shows on the homepage and footer" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
          - { label: "Contact Email", name: "email", widget: "string", required: false }

      - label: "About Page"
        name: "about-page"
        file: "src/_data/about.json"
        fields:
          - { label: "Mission Statement", name: "mission", widget: "text", hint: "The main mission paragraph at the top of the About page" }
          - { label: "Advocacy & Mooting Description", name: "advocacy", widget: "text" }
          - { label: "Community Description", name: "community", widget: "text" }
          - { label: "Education Description", name: "education", widget: "text" }
          - label: "FAQ"
            name: "faq"
            widget: "list"
            hint: "Add, edit, or reorder frequently asked questions"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }

      - label: "GH Cup Page"
        name: "ghcup-page"
        file: "src/_data/ghcup.json"
        fields:
          - { label: "Year", name: "year", widget: "string" }
          - { label: "Headline", name: "headline", widget: "string", hint: "e.g. The GH Cup 2026" }
          - { label: "Short Description", name: "description", widget: "text", hint: "The intro paragraph in the banner" }
          - { label: "About Section", name: "about", widget: "text", hint: "The longer description below. Use a blank line between paragraphs." }
          - label: "How It Works Steps"
            name: "howItWorks"
            widget: "list"
            field: { label: "Step", name: "step", widget: "string" }
          - { label: "Banner Photo", name: "photo", widget: "image", required: false, hint: "Optional photo for the GH Cup banner" }
